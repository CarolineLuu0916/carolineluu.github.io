<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coming Soon · Caroline</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root { --gold:#c8a45c; --gold-light:#e8d293; --cream:#f3ead6; }
  * { margin:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family:'Cormorant Garamond','Noto Serif SC',Georgia,serif; color:var(--cream);
    background-color:#141a2e; display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .bg {
    position:fixed; inset:0; pointer-events:none;
    background:
      radial-gradient(circle 440px at 50% 42%, rgba(232,210,147,.10), transparent 70%),
      radial-gradient(circle at 50% 50%, transparent 28%, rgba(4,6,14,.62) 100%);
  }
  .wrap { position:relative; text-align:center; padding:32px; animation:rise 1s cubic-bezier(.22,.61,.36,1) both; }
  @keyframes rise { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }
  .mod { font-size:12px; letter-spacing:.42em; text-transform:uppercase; color:var(--gold); opacity:.85; margin-bottom:20px; }
  .mod .no { font-style:italic; color:var(--gold-light); margin-right:10px; }
  h1 {
    font-weight:400; font-style:italic; font-size:clamp(40px,9vw,78px); letter-spacing:.02em;
    color:var(--gold-light); text-shadow:0 4px 30px rgba(0,0,0,.5); line-height:1;
  }
  h1 .dots span { display:inline-block; animation:blink 1.4s infinite; }
  h1 .dots span:nth-child(2) { animation-delay:.2s; }
  h1 .dots span:nth-child(3) { animation-delay:.4s; }
  @keyframes blink { 0%,100% { opacity:.22; } 50% { opacity:1; } }
  .rule { width:54px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:26px auto 0; }
  .sub { margin-top:22px; font-size:15px; color:rgba(243,234,214,.6); letter-spacing:.04em; line-height:1.8; }
  .back {
    display:inline-flex; align-items:center; gap:8px; margin-top:42px; padding:11px 24px; border-radius:999px;
    text-decoration:none; color:var(--cream); font-size:14px; letter-spacing:.16em;
    border:1px solid rgba(200,164,92,.42); background:rgba(18,12,4,.4); transition:.25s;
  }
  .back:hover { background:rgba(200,164,92,.16); border-color:var(--gold); }
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="mod"><span class="no"></span><span id="modname">作品</span></div>
  <h1>Coming&nbsp;Soon<span class="dots"><span>.</span><span>.</span><span>.</span></span></h1>
  <div class="rule"></div>
  <div class="sub" id="sub">这个篇章还在打磨中，很快与你见面。</div>
  <a class="back" href="index.html">← 返回展厅</a>
</div>
<script>
  var m = (new URLSearchParams(location.search)).get('m') || '';
  var NO  = { Design:'N° 03', Toy:'N° 04' };
  var SUB = { Design:'设计作品集正在精心布展中，敬请期待。', Toy:'玩具与实验项目正在打磨中，很快与你见面。' };
  if (m) {
    document.getElementById('modname').textContent = m;
    document.querySelector('.mod .no').textContent = NO[m] || '';
    if (SUB[m]) document.getElementById('sub').textContent = SUB[m];
    document.title = m + ' · Coming Soon';
  }
</script>
</body>
</html>
