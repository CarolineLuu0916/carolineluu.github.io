<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XINWEI.LU — 私人展厅</title>
<meta name="description" content="卢欣玮 Xinwei Lu / Caroline Lu — AI 产品设计师的私人展厅：一条可以漫步走入的新印象派长廊，四幅画即四个入口。">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #c8a45c;
  --gold-light: #e8d293;
  --gold-deep: #9c7a2c;
  --olive: #7a8b4e;
  --terracotta: #c4745a;
  --indigo: #4a5b7a;
  --cream: #f3ead6;
  --warm-brown: #3d2b1f;
  --warm-brown-light: #6b5140;
  --ink: #2a1d12;
  --cam-ease: cubic-bezier(.22,.61,.36,1);
}

html, body { height: 100%; }
body {
  font-family: 'Cormorant Garamond', 'Noto Serif SC', Georgia, serif;
  color: var(--warm-brown);
  overflow: hidden;
  position: relative;
  /* The gallery WALL — pointillist plaster (placeholder; swappable with --wall image) */
  background-color: #ece1c8;
  background-image:
    radial-gradient(circle at 50% 50%, rgba(232,210,147,.5) 0 1.3px, transparent 1.8px),
    radial-gradient(circle at 50% 50%, rgba(180,170,205,.45) 0 1.1px, transparent 1.6px),
    radial-gradient(circle at 50% 50%, rgba(196,116,90,.30) 0 1.2px, transparent 1.7px),
    radial-gradient(circle at 50% 50%, rgba(255,252,242,.6) 0 1px, transparent 1.5px),
    radial-gradient(ellipse 120% 80% at 60% 30%, #f1e7d2, #e3d4b6 60%, #d8c5a2 100%);
  background-size: 10px 10px, 13px 12px, 11px 14px, 12px 11px, 100% 100%;
  background-position: 0 0, 5px 6px, 8px 3px, 3px 7px, 0 0;
}

/* soft museum lighting (no blend-mode -> safe for all renderers) */
.lighting {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background:
    radial-gradient(ellipse 55% 50% at 40% 36%, rgba(255,248,228,.55), transparent 60%),
    radial-gradient(ellipse 90% 80% at 50% 50%, transparent 52%, rgba(58,40,24,.22) 100%);
}

/* ── 3D stage ── */
.stage {
  position: absolute; inset: 0;
  z-index: 2;
  perspective: 1300px;
  perspective-origin: 60% 43%;
  overflow: hidden;
}
.corridor {
  position: absolute; inset: 0;
  transform-style: preserve-3d;
  transform: translate3d(var(--cx, 0px), var(--cy, 0px), var(--cz, 0px)) rotateY(var(--ry, 0deg)) rotateX(var(--rx, 0deg));
  will-change: transform;
}

/* the receding floor plane */
.floor {
  position: absolute;
  left: -60%; width: 220%;
  top: 64%; height: 120%;
  transform-origin: top center;
  transform: rotateX(80deg) translateZ(-40px);
  background-color: #cdac74;
  background-image:
    radial-gradient(circle at 50% 50%, rgba(156,122,44,.5) 0 1.6px, transparent 2.1px),
    radial-gradient(circle at 50% 50%, rgba(232,210,147,.55) 0 1.3px, transparent 1.8px),
    radial-gradient(circle at 50% 50%, rgba(196,116,90,.35) 0 1.4px, transparent 1.9px),
    radial-gradient(circle at 50% 50%, rgba(74,91,122,.30) 0 1.1px, transparent 1.6px),
    linear-gradient(to top, #b9924f, #cdac74 50%, #d8bd8a 100%);
  background-size: 14px 14px, 12px 13px, 13px 11px, 11px 12px, 100% 100%;
  box-shadow: inset 0 60px 90px -30px rgba(58,40,24,.4);
}
/* baseboard glow where wall meets floor */
.floor::before {
  content:''; position:absolute; left:0; right:0; top:-2px; height:6px;
  background: linear-gradient(to bottom, rgba(58,40,24,.25), transparent);
}

/* ── Artwork (a hung painting) ── */
.art {
  position: absolute;
  top: 50%; left: 50%;
  width: clamp(230px, 27vw, 420px);
  transform: translate(-50%, -54%) translateX(var(--x)) translateZ(var(--z));
  transform-style: preserve-3d;
  transition: transform .7s var(--cam-ease), filter .6s ease;
  text-decoration: none; color: inherit; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
/* recession: near→far, left→right toward the vanishing point */
.art.a1 { --x: -21vw; --z: 120px;  }
.art.a2 { --x: -1vw;  --z: -60px;  }
.art.a3 { --x: 16vw;  --z: -260px; }
.art.a4 { --x: 31vw;  --z: -460px; }

.art:hover { transform: translate(-50%, -54%) translateX(var(--x)) translateZ(calc(var(--z) + 140px)); z-index: 20; }

/* hanging wire */
.art .wire {
  position: absolute; left: 50%; bottom: 100%; width: 1px; height: 60vh;
  background: linear-gradient(to top, rgba(60,44,28,.5), rgba(60,44,28,0));
  transform: translateX(-.5px);
}

/* gilded frame */
.frame {
  position: relative;
  aspect-ratio: 3 / 4;
  padding: clamp(10px, 1.3vw, 18px);
  background:
    linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 24%, var(--gold-deep) 50%, var(--gold) 74%, var(--gold-light) 100%);
  box-shadow:
    0 2px 2px rgba(255,255,255,.55) inset,
    0 -2px 3px rgba(120,90,30,.5) inset,
    24px 34px 50px -22px rgba(40,28,16,.7),
    8px 12px 22px -8px rgba(40,28,16,.5);
  transition: box-shadow .6s ease, filter .6s ease;
}
.frame::after {
  content:''; position:absolute; inset: clamp(10px,1.3vw,18px);
  border: 2px solid rgba(58,40,24,.30);
  box-shadow: 0 0 0 3px rgba(255,250,235,.3), inset 0 2px 8px rgba(40,28,16,.35);
  pointer-events: none; z-index: 5;
}
.art:hover .frame {
  filter: saturate(1.1) brightness(1.04);
  box-shadow:
    0 2px 2px rgba(255,255,255,.6) inset,
    0 -2px 3px rgba(120,90,30,.5) inset,
    30px 44px 70px -24px rgba(40,28,16,.7),
    0 0 70px rgba(232,210,147,.4);
}

/* painted canvas — pointillist placeholder, swappable via --p image */
.canvas {
  position: relative; width: 100%; height: 100%;
  overflow: hidden;
  background-color: #e9dcc0;
  background-image: var(--p, none);
  background-size: cover; background-position: center;
}
/* color-zone wash (the "subject") */
.canvas .zones { position: absolute; inset: -8%; }
/* divisionist dot field over the zones */
.canvas .dots {
  position: absolute; inset: 0;
  opacity: .6;
  background-image:
    radial-gradient(circle at 50% 50%, rgba(200,164,92,.95) 0 1.4px, transparent 1.8px),
    radial-gradient(circle at 50% 50%, rgba(74,91,122,.85) 0 1.2px, transparent 1.6px),
    radial-gradient(circle at 50% 50%, rgba(196,116,90,.85) 0 1.3px, transparent 1.7px),
    radial-gradient(circle at 50% 50%, rgba(122,139,78,.85) 0 1.1px, transparent 1.5px),
    radial-gradient(circle at 50% 50%, rgba(255,250,235,.95) 0 1px, transparent 1.4px);
  background-size: 9px 9px, 11px 13px, 13px 10px, 10px 12px, 12px 11px;
  background-position: 0 0, 4px 6px, 7px 2px, 2px 8px, 6px 4px;
}
.art[data-has-img="1"] .zones, .art[data-has-img="1"] .dots { display: none; }

/* per-painting palettes (color zones) */
.z1 { background:
  radial-gradient(ellipse 70% 45% at 50% 78%, rgba(94,150,150,.9), transparent 70%),
  radial-gradient(ellipse 60% 50% at 35% 30%, rgba(230,205,134,.9), transparent 65%),
  radial-gradient(ellipse 50% 40% at 72% 58%, rgba(74,91,122,.8), transparent 65%),
  linear-gradient(to top, #8fb0a8, #d9c79a 55%, #ead8b0); }
.z2 { background:
  radial-gradient(circle 26% at 56% 46%, rgba(255,250,228,.95), rgba(255,240,200,.4) 45%, transparent 70%),
  radial-gradient(ellipse 60% 55% at 38% 42%, rgba(122,139,78,.9), transparent 62%),
  radial-gradient(ellipse 55% 45% at 64% 70%, rgba(196,150,90,.7), transparent 65%),
  linear-gradient(to top, #88965a, #c9b985 60%, #e6dcb6); }
.z3 { background:
  radial-gradient(ellipse 45% 45% at 30% 32%, rgba(196,116,90,.9), transparent 62%),
  radial-gradient(ellipse 40% 45% at 70% 40%, rgba(122,139,78,.75), transparent 62%),
  radial-gradient(ellipse 50% 40% at 50% 80%, rgba(74,91,122,.6), transparent 64%),
  radial-gradient(circle 18% at 82% 76%, rgba(230,205,134,.85), transparent 60%),
  linear-gradient(135deg, #d8b48a, #cf9f86 50%, #c9b08a); }
.z4 { background:
  radial-gradient(circle 16% at 36% 40%, rgba(230,205,134,.95), transparent 60%),
  radial-gradient(circle 12% at 66% 34%, rgba(196,116,90,.9), transparent 60%),
  radial-gradient(circle 10% at 30% 68%, rgba(74,91,122,.85), transparent 62%),
  radial-gradient(circle 9% at 62% 72%, rgba(122,139,78,.9), transparent 62%),
  linear-gradient(to top, #d8a878, #e2bd8e 55%, #efd7ab); }

/* caption inside painting */
.canvas .caption {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 3;
  padding: 30% 10% 9%;
  background: linear-gradient(to top, rgba(26,16,6,.66), rgba(26,16,6,.2) 55%, transparent);
  color: #f7efdc; text-align: center;
}
.canvas .caption .no { font-style: italic; font-size: 11px; letter-spacing: .34em; color: var(--gold-light); }
.canvas .caption .ttl { font-size: clamp(22px, 2.4vw, 32px); font-weight: 500; letter-spacing: .04em; line-height: 1.05; text-shadow: 0 2px 12px rgba(0,0,0,.45); }

/* glass sheen */
.canvas .sheen {
  position:absolute; inset:0; z-index:4; pointer-events:none;
  background: linear-gradient(108deg, transparent 38%, rgba(255,255,255,.22) 50%, transparent 64%);
  opacity:.45; transition: opacity .5s ease;
}
.art:hover .canvas .sheen { opacity: .8; }

/* brass plaque */
.plaque {
  margin: 14px auto 0; width: max-content; max-width: 96%;
  padding: 8px 18px; text-align: center;
  background: linear-gradient(160deg, #dcc085, #c8a45c 46%, #9c7a2c);
  box-shadow: 0 5px 12px -5px rgba(40,28,16,.6), 0 1px 0 rgba(255,255,255,.4) inset;
  opacity: 0; transform: translateY(6px); transition: opacity .5s ease, transform .5s ease;
}
.art:hover .plaque { opacity: 1; transform: translateY(0); }
.plaque .pt { font-family: 'Noto Serif SC', serif; font-weight: 600; font-size: clamp(11px,1.1vw,13px); letter-spacing: .16em; color: #3a2810; }
.plaque .pm { font-style: italic; font-size: clamp(10px,1vw,12px); letter-spacing: .04em; color: #5a3f18; margin-top: 1px; }

/* coming-soon wax seal */
.seal {
  position: absolute; top: -12px; right: -8px; z-index: 12;
  width: 52px; height: 52px; border-radius: 50%; display: grid; place-items: center;
  font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 9.5px; line-height: 1.05; text-align: center; letter-spacing: .06em;
  color: #f7efdc; background: radial-gradient(circle at 38% 32%, #b9573f, #8f3a28 70%);
  box-shadow: 0 6px 14px -5px rgba(80,30,18,.7), 0 1px 2px rgba(255,255,255,.3) inset;
  transform: rotate(-12deg);
}
.art.soon { cursor: default; }
.art.soon .canvas { filter: saturate(.72) brightness(.97); }

/* ── overlays (flat, fixed) ── */
.masthead {
  position: fixed; top: 30px; left: 36px; z-index: 30;
  opacity: 0; animation: fade .9s .2s ease forwards;
}
.masthead .name { font-size: 26px; font-weight: 500; letter-spacing: .14em; color: var(--ink); }
.masthead .name .sep { color: var(--gold); }
.masthead .role { font-family: 'Noto Serif SC', serif; font-weight: 300; font-size: 11px; letter-spacing: .3em; color: var(--warm-brown-light); margin-top: 3px; }

.gallery-title {
  position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 30;
  text-align: center; opacity: 0; animation: fade .9s .35s ease forwards;
}
.gallery-title .k { font-style: italic; font-size: 11px; letter-spacing: .4em; color: var(--gold-deep); text-transform: uppercase; }
.gallery-title .r { display:flex; align-items:center; gap:10px; justify-content:center; margin-top:6px; }
.gallery-title .r::before, .gallery-title .r::after { content:''; width:40px; height:1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
.gallery-title .r .lz { width:6px; height:6px; background: var(--gold); transform: rotate(45deg); }

.hint {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 30;
  font-style: italic; font-size: 13px; letter-spacing: .2em; color: var(--warm-brown-light);
  opacity: 0; animation: fade 1s 1.1s ease forwards;
}
.hint .s { color: var(--gold); }
.colophon {
  position: fixed; bottom: 26px; right: 36px; z-index: 30;
  font-style: italic; font-size: 15px; letter-spacing: .02em; color: var(--gold-deep);
  opacity: 0; animation: fade 1s 1.3s ease forwards;
}
@keyframes fade { from { opacity:0; transform: translateY(10px) translateX(var(--tx,0)); } to { opacity:1; } }
.gallery-title { --tx:-50%; } .gallery-title.fade { transform: translateX(-50%); }
.hint { --tx:-50%; }

/* entrance: paintings glide in from depth */
.art { opacity: 0; animation: enter 1.1s var(--cam-ease) forwards; }
.art.a1 { animation-delay: .35s; } .art.a2 { animation-delay: .5s; }
.art.a3 { animation-delay: .65s; } .art.a4 { animation-delay: .8s; }
@keyframes enter { from { opacity: 0; } to { opacity: 1; } }

/* ── dive-in transition ── */
#veil { position: fixed; inset: 0; z-index: 80; pointer-events: none; opacity: 0; }
#veil.on { pointer-events: all; animation: bloom .8s ease-in forwards; }
@keyframes bloom {
  0% { opacity:0; background: radial-gradient(circle at var(--ox,50%) var(--oy,50%), rgba(232,210,147,0) 0%, rgba(243,234,214,0) 0%); }
  40% { opacity:1; background: radial-gradient(circle at var(--ox,50%) var(--oy,50%), rgba(232,210,147,.75) 0%, rgba(243,234,214,.9) 44%, rgba(243,234,214,0) 74%); }
  100% { opacity:1; background: radial-gradient(circle at var(--ox,50%) var(--oy,50%), rgba(243,234,214,1) 0%, rgba(243,234,214,1) 100%); }
}
.art.diving { z-index: 60; animation: dive .8s var(--cam-ease) forwards; }
@keyframes dive { to { transform: translate(-50%,-54%) translateX(var(--x)) translateZ(900px); opacity: 0; } }
.corridor.receding .art:not(.diving) { transition: transform .6s ease, opacity .6s ease, filter .6s ease; opacity: .2; filter: blur(3px); }

/* ── responsive: vertical scroll gallery on small screens ── */
@media (max-width: 880px) {
  body { overflow-y: auto; }
  .stage { position: static; perspective: none; overflow: visible; }
  .corridor { position: static; transform: none !important; transform-style: flat; padding: 92px 20px 60px; display: flex; flex-direction: column; gap: 40px; align-items: center; }
  .floor, .art .wire { display: none; }
  .art { position: static; transform: none !important; width: min(86vw, 380px); animation: enterm 1s ease forwards; }
  .art:hover { transform: none !important; }
  .art.a1{animation-delay:.15s} .art.a2{animation-delay:.3s} .art.a3{animation-delay:.45s} .art.a4{animation-delay:.6s}
  .plaque { opacity:1; transform:none; }
  .gallery-title, .colophon { position: static; transform: none; margin: 0 auto; }
  .masthead { position: static; margin: 18px auto 0; text-align:center; left:auto; }
  .hint { display:none; }
  @keyframes enterm { from{opacity:0; transform: translateY(26px)} to{opacity:1} }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration:.01ms !important; }
  .corridor { transform: none !important; }
  .art { opacity: 1; }
}
</style>
</head>
<body>

<div class="lighting"></div>

<header class="masthead">
  <div class="name">XINWEI<span class="sep">·</span>LU</div>
  <div class="role">AI 产 品 设 计 师</div>
</header>
<div class="gallery-title">
  <div class="k">A Private Gallery · Est. 2026</div>
  <div class="r"><span class="lz"></span></div>
</div>

<main class="stage">
  <div class="corridor" id="corridor">

    <div class="floor"></div>

    <!-- No.01 AI Trends -->
    <a class="art a1" href="./ai-trends/index.html" data-module="AI Trends" data-has-img="1" style="--p:url('assets/paintings/p1.jpg')">
      <span class="wire"></span>
      <div class="frame"><div class="canvas">
        <div class="zones z1"></div><div class="dots"></div><div class="sheen"></div>
        <div class="caption"><div class="no">N&deg; 01</div><div class="ttl">AI Trends</div></div>
      </div></div>
      <div class="plaque"><div class="pt">行业全景情报站</div><div class="pm">数据与时间 · 综合媒介 · 2026</div></div>
    </a>

    <!-- No.02 MY App -->
    <a class="art a2" href="./my/index.html" data-module="MY App" data-has-img="1" style="--p:url('assets/paintings/p2.jpg')">
      <span class="wire"></span>
      <div class="frame"><div class="canvas">
        <div class="zones z2"></div><div class="dots"></div><div class="sheen"></div>
        <div class="caption"><div class="no">N&deg; 02</div><div class="ttl">MY App</div></div>
      </div></div>
      <div class="plaque"><div class="pt">ME, reflected in YOU</div><div class="pm">代码与情感 · 交互装置 · 2026</div></div>
    </a>

    <!-- No.03 Design -->
    <a class="art a3 soon" href="javascript:void(0)" data-module="Design" data-has-img="1" style="--p:url('assets/paintings/p3.jpg')">
      <span class="wire"></span>
      <span class="seal">Coming<br>Soon</span>
      <div class="frame"><div class="canvas">
        <div class="zones z3"></div><div class="dots"></div><div class="sheen"></div>
        <div class="caption"><div class="no">N&deg; 03</div><div class="ttl">Design</div></div>
      </div></div>
      <div class="plaque"><div class="pt">设计灵感库 & 组件工场</div><div class="pm">像素与品味 · 布展中</div></div>
    </a>

    <!-- No.04 Toy -->
    <a class="art a4 soon" href="javascript:void(0)" data-module="Toy" data-has-img="1" style="--p:url('assets/paintings/p4.jpg')">
      <span class="wire"></span>
      <span class="seal">Coming<br>Soon</span>
      <div class="frame"><div class="canvas">
        <div class="zones z4"></div><div class="dots"></div><div class="sheen"></div>
        <div class="caption"><div class="no">N&deg; 04</div><div class="ttl">Toy</div></div>
      </div></div>
      <div class="plaque"><div class="pt">潮玩设计工作台</div><div class="pm">树脂与想象 · 布展中</div></div>
    </a>

  </div>
</main>

<p class="hint"><span class="s">◇</span>&nbsp; 移动鼠标，漫步展厅 · 点击走进画中 &nbsp;<span class="s">◇</span></p>
<footer class="colophon">Xinwei&nbsp;Lu</footer>

<div id="veil"></div>

<script>
(function () {
  "use strict";
  var corridor = document.getElementById('corridor');
  var veil = document.getElementById('veil');
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var fine = matchMedia('(pointer: fine)').matches && matchMedia('(min-width: 881px)').matches;

  // walk the corridor with the cursor (eased)
  var tX = 0, tY = 0, tRY = 0, tRX = 0, cX = 0, cY = 0, cRY = 0, cRX = 0;
  if (fine && !reduce) {
    window.addEventListener('mousemove', function (e) {
      var nx = e.clientX / innerWidth - 0.5;
      var ny = e.clientY / innerHeight - 0.5;
      tX = -nx * 180;     // dolly left/right along the wall
      tY = -ny * 30;
      tRY = -nx * 6;      // subtle look-around
      tRX = ny * 3;
    }, { passive: true });

    (function loop() {
      cX += (tX - cX) * 0.06; cY += (tY - cY) * 0.06;
      cRY += (tRY - cRY) * 0.06; cRX += (tRX - cRX) * 0.06;
      corridor.style.setProperty('--cx', cX.toFixed(1) + 'px');
      corridor.style.setProperty('--cy', cY.toFixed(1) + 'px');
      corridor.style.setProperty('--ry', cRY.toFixed(2) + 'deg');
      corridor.style.setProperty('--rx', cRX.toFixed(2) + 'deg');
      requestAnimationFrame(loop);
    })();
  }

  document.querySelectorAll('.art').forEach(function (art) {
    art.addEventListener('click', function (e) {
      if (art.classList.contains('soon')) {
        e.preventDefault();
        var seal = art.querySelector('.seal');
        if (seal) seal.animate(
          [{ transform: 'rotate(-12deg) scale(1)' }, { transform: 'rotate(-12deg) scale(1.2)' }, { transform: 'rotate(-12deg) scale(1)' }],
          { duration: 380, easing: 'ease-out' });
        return;
      }
      var href = art.getAttribute('href');
      if (!href || reduce) return;
      e.preventDefault();
      var r = art.getBoundingClientRect();
      veil.style.setProperty('--ox', (r.left + r.width / 2) + 'px');
      veil.style.setProperty('--oy', (r.top + r.height / 2) + 'px');
      corridor.classList.add('receding');
      art.classList.add('diving');
      veil.classList.add('on');
      setTimeout(function () { window.location.href = href; }, 720);
    });
  });
})();
</script>

</body>
</html>
