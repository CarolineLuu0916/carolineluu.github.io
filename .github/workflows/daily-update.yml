name: AI Trends 数据更新

# 定时只跑日报；其它板块由网页按钮 / 手动触发时传 section。
# 提交回 main 后 GitHub Pages 会自动重新部署。
on:
  schedule:
    # cron 用 UTC。00:00 UTC = 北京 08:00。（仅触发 daily 日报）
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      section:
        description: "要更新的板块"
        type: choice
        default: daily
        options:
          - daily
          - repos
          - wiki
          - models
          - timeline
          - skills

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      SECTION: ${{ github.event.inputs.section || 'daily' }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: 调研并更新（${{ github.event.inputs.section || 'daily' }}）
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_MODEL: ${{ vars.KIMI_MODEL }}   # 可选：仓库 Variables 里设置以覆盖默认模型
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # repos 板块抓 star 用，提升 API 限额
        run: node scripts/update-trends.mjs "$SECTION"

      - name: 提交变更
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "trends-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add ai-trends/js/data-*.js ai-trends/index.html
            git commit -m "chore(ai-trends): ${SECTION} 自动更新 $(TZ=Asia/Shanghai date +%F)"
            git push
            echo "已提交并推送更新。"
          else
            echo "无变化，跳过提交。"
          fi
